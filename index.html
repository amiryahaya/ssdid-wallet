<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSDID — Self-Sovereign Digital Identity</title>
  <meta name="description" content="A self-sovereign identity wallet with post-quantum cryptography. Own your digital identity — no middlemen, no compromises.">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* === TOKENS === */
    :root {
      --bg-primary: #0A0C10;
      --bg-secondary: #0d1117;
      --bg-footer: #060810;
      --accent: #4A9EFF;
      --accent-hover: #3b8de6;
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.6);
      --text-tertiary: rgba(255, 255, 255, 0.4);
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.06);
      --glow: rgba(74, 158, 255, 0.12);
      --glow-soft: rgba(74, 158, 255, 0.08);
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --font: 'DM Sans', sans-serif;
    }

    /* === RESET === */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    /* === NAV === */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.3s ease;
    }
    .nav.scrolled {
      background: rgba(10, 12, 16, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nav-brand img {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
    }
    .nav-brand span {
      font-weight: 600;
      font-size: 18px;
      letter-spacing: -0.5px;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
    }
    .nav-links a {
      font-size: 14px;
      color: var(--text-secondary);
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text-primary); }
    .nav-cta {
      padding: 8px 20px;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
      border: none;
      cursor: pointer;
    }
    .nav-cta:hover { background: var(--accent-hover); }
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }
    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--text-primary);
      border-radius: 1px;
      transition: transform 0.3s, opacity 0.3s;
    }
    @media (max-width: 767px) {
      .nav-links {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        flex-direction: column;
        background: rgba(10, 12, 16, 0.98);
        backdrop-filter: blur(12px);
        padding: 24px;
        gap: 20px;
      }
      .nav-links.open { display: flex; }
      .hamburger { display: flex; }
      .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
      .hamburger.open span:nth-child(2) { opacity: 0; }
      .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
    }

    /* === HERO === */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 80px;
      position: relative;
      overflow: hidden;
    }
    .hero-glow-1 {
      position: absolute;
      top: -120px;
      right: -120px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .hero-glow-2 {
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, var(--glow-soft) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 640px;
    }
    .hero-logo {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-xl);
      margin: 0 auto 24px;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.25rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 16px;
    }
    .hero-subtitle {
      font-size: clamp(1rem, 2vw, 1.125rem);
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .hero-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: var(--radius-md);
      background: var(--accent);
      color: var(--text-primary);
      font-size: 15px;
      font-weight: 600;
      transition: background 0.2s;
      border: none;
      cursor: pointer;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-outline {
      display: inline-flex;
      align-items: center;
      padding: 12px 28px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(74, 158, 255, 0.3);
      color: var(--accent);
      font-size: 15px;
      font-weight: 500;
      transition: border-color 0.2s, color 0.2s;
      background: none;
      cursor: pointer;
    }
    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <nav class="nav" id="nav">
    <a href="#" class="nav-brand">
      <img src="assets/logo-36.png" alt="SSDID Logo" width="36" height="36">
      <span>SSDID</span>
    </a>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="navLinks">
      <a href="#features">Features</a>
      <a href="#how-it-works">How It Works</a>
      <a href="https://play.google.com/store" class="nav-cta">Download</a>
    </div>
  </nav>
  <section class="hero">
    <div class="hero-glow-1"></div>
    <div class="hero-glow-2"></div>
    <div class="hero-content">
      <img src="assets/logo-80.png" alt="SSDID" class="hero-logo" width="80" height="80">
      <h1>Your Identity.<br>Your Control.</h1>
      <p class="hero-subtitle">A self-sovereign identity wallet with post-quantum cryptography. Own your digital identity — no middlemen, no compromises.</p>
      <div class="hero-buttons">
        <a href="https://play.google.com/store" class="btn-primary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3.609 1.814L13.792 12 3.61 22.186a.996.996 0 0 1-.61-.92V2.734a1 1 0 0 1 .609-.92zm10.89 10.893l2.302 2.302-10.937 6.333 8.635-8.635zm3.199-3.199l2.302 2.302a1 1 0 0 1 0 1.38l-2.302 2.302L15.396 12l2.302-2.492zM5.864 2.658L16.8 9.49l-2.302 2.302L5.864 2.658z"/></svg>
          Google Play
        </a>
        <a href="#features" class="btn-outline">Learn More</a>
      </div>
    </div>
  </section>
  <!-- FEATURES -->
  <!-- HOW IT WORKS -->
  <!-- DOWNLOAD CTA -->
  <!-- FOOTER -->
  <script>
    // Nav scroll effect
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 50);
    });

    // Mobile hamburger
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('navLinks');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      navLinks.classList.toggle('open');
    });

    // Close mobile menu on link click
    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        hamburger.classList.remove('open');
        navLinks.classList.remove('open');
      });
    });
  </script>
</body>
</html>
