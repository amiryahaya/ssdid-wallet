name: SsdidWallet
options:
  bundleIdPrefix: my.ssdid
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  KazSign:
    path: Packages/KazSign
  LibOQS:
    path: Packages/LibOQS
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa.git
    from: "9.7.0"

settings:
  base:
    SWIFT_VERSION: "6"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: "HY5S7B8P9R"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_ALLOWED: true
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  SsdidWallet:
    type: application
    platform: iOS
    sources:
      - path: SsdidWallet
        excludes:
          - "**/.DS_Store"
    info:
      path: SsdidWallet/Info.plist
      properties:
        LSApplicationQueriesSchemes:
          - ssdid-drive
        UILaunchScreen:
          UIColorName: LaunchBackground
        CFBundleURLTypes:
          - CFBundleURLName: my.ssdid.wallet
            CFBundleURLSchemes:
              - ssdid
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: my.ssdid.wallet
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_EMIT_LOC_STRINGS: true
        SWIFT_STRICT_CONCURRENCY: minimal
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: "SSDID Wallet"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: false
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_NSCameraUsageDescription: "SSDID Wallet needs camera access to scan QR codes for identity verification and service registration."
        INFOPLIST_KEY_NSFaceIDUsageDescription: "SSDID Wallet uses Face ID to protect your decentralized identity and authorize transactions."
    dependencies:
      - package: KazSign
      - package: LibOQS
      - package: Sentry
        product: SentrySwiftUI
    entitlements:
      path: SsdidWallet.entitlements
      properties:
        aps-environment: development
        com.apple.developer.associated-domains:
          - applinks:registry.ssdid.my
        keychain-access-groups:
          - $(AppIdentifierPrefix)my.ssdid.wallet

  SsdidWalletTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SsdidWalletTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: SsdidWallet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: my.ssdid.wallet.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SsdidWallet.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/SsdidWallet"
        BUNDLE_LOADER: $(TEST_HOST)
