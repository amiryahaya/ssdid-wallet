name: SDK CI

on:
  pull_request:
    paths:
      - 'android/sdk/**'
      - 'sdk/**'
  push:
    tags:
      - 'sdk-v*'

jobs:
  android-sdk-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-sdk-${{ hashFiles('android/**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-sdk-

      - name: Build ssdid-core
        working-directory: android
        run: ./gradlew :sdk:ssdid-core:compileDebugKotlin

      - name: Build ssdid-pqc
        working-directory: android
        run: ./gradlew :sdk:ssdid-pqc:compileDebugKotlin

      - name: Build ssdid-core-testing
        working-directory: android
        run: ./gradlew :sdk:ssdid-core-testing:compileDebugKotlin

      - name: Run SDK unit tests
        working-directory: android
        run: ./gradlew :sdk:ssdid-core:testDebugUnitTest

      - name: Run PQC unit tests
        working-directory: android
        run: ./gradlew :sdk:ssdid-pqc:testDebugUnitTest

      - name: API compatibility check
        working-directory: android
        run: ./gradlew :sdk:ssdid-core:apiCheck

      - name: Build sample apps
        working-directory: android
        run: |
          ./gradlew :sdk:samples:basic-identity:compileDebugKotlin 2>/dev/null || echo "Sample basic-identity not yet registered"
          ./gradlew :sdk:samples:credential-flow:compileDebugKotlin 2>/dev/null || echo "Sample credential-flow not yet registered"
          ./gradlew :sdk:samples:custom-storage:compileDebugKotlin 2>/dev/null || echo "Sample custom-storage not yet registered"

  ios-sdk-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build SsdidCore
        run: swift build --package-path sdk/ios/SsdidCore

      - name: Test SsdidCore
        run: swift test --package-path sdk/ios/SsdidCore

      - name: Build SsdidPqc
        run: swift build --package-path sdk/ios/SsdidPqc

  android-sdk-publish:
    if: startsWith(github.ref, 'refs/tags/sdk-v')
    needs: android-sdk-build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Publish ssdid-core
        working-directory: android
        run: ./gradlew :sdk:ssdid-core:publishReleasePublicationToGitHubPackagesRepository
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish ssdid-core-testing
        working-directory: android
        run: ./gradlew :sdk:ssdid-core-testing:publishReleasePublicationToGitHubPackagesRepository
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish ssdid-pqc
        working-directory: android
        run: ./gradlew :sdk:ssdid-pqc:publishReleasePublicationToGitHubPackagesRepository
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
