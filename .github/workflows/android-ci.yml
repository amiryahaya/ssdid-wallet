name: Android CI

on:
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android-*.yml'
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-*.yml'

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install NDK and CMake
        run: |
          sdkmanager --install "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Compile
        run: ./gradlew compileDebugKotlin -x lint

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest -x lint

      - name: Lint
        run: ./gradlew lint

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: android/app/build/reports/lint-results-debug.html
          retention-days: 14

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: android/app/build/reports/tests/testDebugUnitTest/
          retention-days: 14
