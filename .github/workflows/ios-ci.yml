name: iOS CI

on:
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-*.yml'
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-*.yml'

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Select Xcode
        run: |
          # Use the latest available Xcode on the runner
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Show Xcode and simulator info
        run: |
          xcodebuild -version
          xcrun simctl list runtimes | grep iOS | tail -3

      - name: Find simulator destination
        id: sim
        run: |
          # Pick the first available iPhone simulator
          DEST=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(f\"platform=iOS Simulator,id={d['udid']}\")
                          sys.exit(0)
          sys.exit(1)
          ")
          echo "destination=$DEST" >> "$GITHUB_OUTPUT"
          echo "Using destination: $DEST"

      - name: Resolve SPM dependencies
        run: xcodebuild -resolvePackageDependencies -scheme SsdidWallet -clonedSourcePackagesDirPath .spm-cache

      - name: Build (Debug, Simulator)
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme SsdidWallet \
            -destination '${{ steps.sim.outputs.destination }}' \
            -clonedSourcePackagesDirPath .spm-cache \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | xcpretty --color

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme SsdidWallet \
            -destination '${{ steps.sim.outputs.destination }}' \
            -clonedSourcePackagesDirPath .spm-cache \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults \
            2>&1 | xcpretty --color

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: ios/TestResults.xcresult
          retention-days: 14
