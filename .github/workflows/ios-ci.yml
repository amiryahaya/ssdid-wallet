name: iOS CI

on:
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ios-*.yml'
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-*.yml'

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve SPM dependencies
        run: xcodebuild -resolvePackageDependencies -scheme SsdidWallet -clonedSourcePackagesDirPath .spm-cache

      - name: Build (Debug, Simulator)
        run: |
          xcodebuild build \
            -scheme SsdidWallet \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -clonedSourcePackagesDirPath .spm-cache \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color || true
          # Check exit code from xcodebuild (not xcpretty)
          exit ${PIPESTATUS[0]}

      - name: Test
        run: |
          xcodebuild test \
            -scheme SsdidWallet \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -clonedSourcePackagesDirPath .spm-cache \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults \
            | xcpretty --color || true
          exit ${PIPESTATUS[0]}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: ios/TestResults.xcresult
          retention-days: 14
